<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - Lora Magazine</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@700&family=Roboto&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: "Roboto", sans-serif;
        color: #1a1a2e;
      }
      h1, h2, h3, h4 {
        font-family: "Lato", sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#F9FAFB]">
    <header class="sticky top-0 z-50 bg-white shadow-sm px-8 py-4 flex justify-between items-center">
      <div class="text-xl font-bold font-lato"><a href="/"><img src="/images/Logo.png" alt="Digital Evolution Journal Logo" class="h-14 w-37"></a></div>
      <nav class="space-x-6 text-sm flex items-center">
        <a href="/" class="hover:text-[#3F72AF]">Home</a>
        <a href="/login" class="bg-[#F9A826] hover:bg-[#e28e0c] text-white px-6 py-1 rounded">Login</a>
        <a href="/register" class="bg-[#3F72AF] hover:bg-[#345b8f] text-white text-sm px-4 py-1 rounded">Register</a>
      </nav>
    </header>
    <section class="flex items-center justify-center min-h-screen py-10 px-4">
      <div class="bg-white p-10 rounded-xl shadow-md w-full max-w-md border border-gray-200">
        <h2 class="text-2xl font-bold mb-6 text-center text-[#1A1A2E]">Forgot Password?</h2>
        <form id="forgotForm" class="space-y-6">
          <div>
            <label class="block text-sm font-medium mb-1">Email Address</label>
            <input id="email" type="email" class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[#3F72AF]" placeholder="you@example.com" required />
          </div>
          <div id="forgotMsg" class="text-green-600 text-sm text-center"></div>
          <div id="forgotError" class="text-red-600 text-sm text-center"></div>
          <button type="submit" class="w-full bg-[#3F72AF] hover:bg-[#345b8f] text-white py-2 rounded font-medium">
            Send Reset Link
          </button>
        </form>
        <p class="mt-6 text-sm text-center text-gray-600">
          Remembered your password?
          <a href="/login" class="text-[#3F72AF] hover:underline">Back to Login</a>
        </p>
      </div>
    </section>
    <script>
      document.getElementById('forgotForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const msgDiv = document.getElementById('forgotMsg');
        const errorDiv = document.getElementById('forgotError');
        msgDiv.textContent = '';
        errorDiv.textContent = '';
        try {
          const res = await fetch('/api/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
          });
          const data = await res.json();
          if (res.ok && data.status === 'ok') {
            msgDiv.textContent = data.message || 'If this email exists, you will receive a password reset link.';
          } else {
            errorDiv.textContent = data.error || 'Request failed.';
          }
        } catch (err) {
          errorDiv.textContent = 'Network error. Please try again.';
        }
      });
    </script>
  </body>
</html>
