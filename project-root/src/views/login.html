<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Digital Evolution Journal</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Merriweather', 'serif'],
          },
          colors: {
            navy: {
              50: '#f8fafc',
              100: '#f1f5f9',
              200: '#e2e8f0',
              300: '#cbd5e1',
              400: '#94a3b8',
              500: '#64748b',
              600: '#475569',
              700: '#334155',
              800: '#1e293b',
              900: '#0f172a',
            },
            gold: {
              50: '#fdfdf6',
              100: '#fbf9eb',
              500: '#d97706',
              600: '#b45309',
              700: '#78350f',
            }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3, h4, h5, h6, .font-editorial { font-family: 'Merriweather', serif; }
  </style>
</head>
<body class="text-navy-900 bg-[#f8fafc] min-h-screen flex flex-col justify-between">

  <!-- Navbar -->
  <header class="bg-white border-b border-navy-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <div class="flex items-center">
        <a href="/" class="transition-opacity hover:opacity-90">
          <img src="/images/Logo.png" alt="Digital Evolution Journal Logo" class="h-10 sm:h-12 w-auto">
        </a>
      </div>
      <nav class="space-x-6 text-sm font-medium">
        <a href="/" class="text-navy-500 hover:text-gold-500 transition-colors">Home</a>
        <a href="/researches" class="text-navy-500 hover:text-gold-500 transition-colors">Published Papers</a>
      </nav>
    </div>
  </header>

  <!-- Login Card Section -->
  <main class="flex-grow flex items-center justify-center py-16 px-4">
    <div class="bg-white p-8 sm:p-10 rounded-xl border border-navy-100 shadow-sm w-full max-w-md space-y-6">
      <div class="text-center space-y-2">
        <h2 class="text-2xl font-bold font-editorial text-navy-900">Welcome Back</h2>
        <p class="text-sm text-navy-500">Sign in to manage your submissions and reviews</p>
      </div>

      <form id="loginForm" class="space-y-4">
        <div class="space-y-1">
          <label class="block text-xs font-semibold text-navy-700 uppercase tracking-wider">Email Address</label>
          <input id="email" type="email" class="w-full border border-navy-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gold-500/20 focus:border-gold-500 bg-white" placeholder="email@journal.com" required />
        </div>
        <div class="space-y-1">
          <div class="flex justify-between items-center">
            <label class="block text-xs font-semibold text-navy-700 uppercase tracking-wider">Password</label>
            <a href="/forgot-password" class="text-xs text-gold-500 hover:underline">Forgot password?</a>
          </div>
          <input id="password" type="password" class="w-full border border-navy-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gold-500/20 focus:border-gold-500 bg-white" placeholder="••••••••" required />
        </div>

        <div class="flex items-center text-sm">
          <label class="flex items-center gap-2 text-navy-600 cursor-pointer">
            <input type="checkbox" class="rounded border-navy-300 text-gold-500 focus:ring-gold-500/20" />
            Keep me signed in
          </label>
        </div>

        <div id="loginError" class="text-red-600 text-xs text-center font-medium bg-red-50 py-2 rounded-lg empty:hidden"></div>

        <button type="submit" class="w-full bg-navy-900 hover:bg-navy-800 text-white py-3 rounded-lg font-medium transition-all shadow-sm">
          Sign In
        </button>
      </form>

      <p class="text-sm text-center text-navy-500">
        New to the journal?
        <a href="/register" class="text-gold-500 hover:underline font-medium">Create an account</a>
      </p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-navy-900 text-navy-400 text-xs py-8 border-t border-navy-800 text-center">
    <div class="max-w-7xl mx-auto px-4 flex flex-col sm:flex-row justify-between items-center gap-4">
      <div class="flex gap-4">
        <a href="#" class="hover:text-navy-300">Privacy Policy</a>
        <span>·</span>
        <a href="#" class="hover:text-navy-300">Terms of Service</a>
      </div>
      <div>© 2026 Digital Evolution Journal. All rights reserved.</div>
    </div>
  </footer>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('loginError');
      errorDiv.textContent = '';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok && data.status === 'ok') {
          const params = new URLSearchParams(window.location.search);
          const next = params.get('next') || '/dashboard/author';
          window.location.href = next;
        } else {
          errorDiv.textContent = data.error || 'Login failed. Please check your credentials.';
        }
      } catch (err) {
        errorDiv.textContent = 'A connection error occurred. Please try again.';
      }
    });
  </script>

</body>
</html>
